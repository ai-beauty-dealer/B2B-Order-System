<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Dealer - B2B Order System</title>
    <link rel="stylesheet" href="style.css?v=1.18">
</head>

<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
    </div>

    <!-- Login Screen -->
    <div id="login-container" class="container">
        <h2>パートナーログイン</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="username">ログインID</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary">ログイン</button>
        </form>
    </div>

    <!-- Order Screen (Initially Hidden) -->
    <div id="order-container" class="container hidden">
        <header>
            <h2>商品一覧</h2>
            <button id="logout-btn" class="btn-secondary">ログアウト</button>
        </header>

        <!-- Announcement Banner -->
        <div id="announcement-banner" class="banner hidden">
            <p id="announcement-text">システムアップデートのお知らせ：備考欄と絞り込み機能が追加されました🎉</p>
        </div>

        <div class="filter-tabs">
            <button id="tab-all" class="tab-btn active">すべて</button>
            <button id="tab-favorites" class="tab-btn">お気に入り ★</button>
            <button id="tab-history" class="tab-btn">発注履歴 🕒</button>
        </div>

        <div class="search-container" id="search-wrapper">
            <input type="text" id="search-input" placeholder="商品名で検索...">
        </div>

        <!-- Manufacturer Chips -->
        <div id="manufacturer-chips-container" class="category-scroll-wrapper"
            style="margin-bottom: 0px; padding-bottom: 8px;">
            <!-- Manufacturer Chips injected by JS -->
        </div>

        <!-- Category Chips -->
        <div id="category-chips-container" class="category-scroll-wrapper">
            <!-- Chips injected by JS -->
        </div>

        <div id="item-list">
            <!-- Items will be loaded here dynamically -->
        </div>

        <!-- Custom Items Wrapper -->
        <div id="custom-items-wrapper" style="margin-top: 20px;">
            <div id="custom-items-list">
                <!-- Dynamic custom items injected here -->
            </div>
            <button id="add-custom-item-btn" type="button" class="btn-secondary"
                style="width: 100%; border: 2px dashed var(--primary-color); background: #f8fafc; color: var(--primary-color); padding: 12px; font-weight: bold; margin-top: 10px;">
                ＋ 特注・その他の商品を追加する
            </button>
        </div>

        <div id="history-list" class="hidden">
            <!-- Order history will be loaded here dynamically -->
        </div>

        <div class="cart-summary">
            <p>選択中: <span id="total-qty">0</span>点</p>
            <button id="cancel-edit-btn" class="btn-secondary hidden"
                style="background:#fff; border-radius: var(--radius-full);">編集取消</button>
            <button id="save-draft-btn" class="btn-secondary"
                style="background:#f1f5f9; border-radius: var(--radius-full); color: var(--text-main); font-weight: 500;">一時保存</button>
            <button id="order-submit-btn" class="btn-primary">発注する</button>
        </div>
    </div> <!-- Close order-container -->

    <!-- Confirmation Screen -->
    <div id="confirmation-container" class="container hidden">
        <header>
            <h2>発注内容の最終確認</h2>
        </header>

        <div class="confirm-items-wrapper">
            <p class="modal-desc" style="margin-bottom: 20px;">以下の内容で発注を確定しますか？</p>
            <div id="confirm-item-list" class="confirm-items">
                <!-- Items injected by JS -->
            </div>
        </div>

        <div class="remarks-container" style="margin-top: 20px;">
            <label for="order-remarks"
                style="display: block; font-weight: bold; margin-bottom: 8px; color: var(--text-main);">備考・ご要望</label>
            <textarea id="order-remarks" placeholder="納品日時のご指定や注意事項があればご記入ください..." rows="3"
                style="width: 100%; border-radius: var(--radius-md); padding: 12px; border: 1px solid var(--border-color); font-family: inherit; resize: vertical;"></textarea>
        </div>

        <div class="modal-actions" style="margin-top: 30px; display: flex; gap: 12px;">
            <button id="modal-cancel-btn" class="btn-secondary" style="flex: 1;">戻る</button>
            <button id="modal-confirm-btn" class="btn-primary" style="flex: 1;">注文を確定する</button>
        </div>
    </div>
    <script src="config.js?v=1.18"></script>
    <script src="app.js?v=1.18"></script>
</body>

</html>
