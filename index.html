<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>AI Beauty Dealer - B2B Order System</title>
    <link rel="stylesheet" href="style.css?v=2.11.9">
</head>

<body>
    <!-- Non-blocking Loading Banner (does NOT intercept clicks) -->
    <div id="loading-banner" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; background: var(--primary); color: white; text-align: center; padding: 10px 16px; font-weight: 600; font-size: 0.875rem; z-index: 999; pointer-events: none;">
        <span id="loading-banner-text">読み込み中...</span>
    </div>

    <!-- Login Screen -->
    <div id="login-container" class="container" style="padding-top: 16px;">
        <h2>パートナーログイン</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="username">ログインID</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="remember-me" style="width: auto; margin: 0; cursor: pointer;">
                <label for="remember-me"
                    style="font-size: 0.875rem; color: #475569; cursor: pointer; user-select: none;">ログインIDを記憶する</label>
            </div>
            <div class="input-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" id="login-btn" class="btn-primary">ログイン</button>
        </form>
        <!-- Master Salon Selector (Initially Hidden) -->
        <div id="master-salon-selector" class="hidden"
            style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee;">
            <p style="font-size: 0.875rem; font-weight: bold; margin-bottom: 8px; color: var(--primary);">【マスターアカウント】
            </p>
            <label for="master-salon-select"
                style="font-size: 0.875rem; margin-bottom: 4px; display: block;">ログインするサロンを選択</label>
            <select id="master-salon-select"
                style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; margin-bottom: 12px;">
                <!-- Options injected by JS -->
            </select>
            <button type="button" id="master-login-btn" class="btn-primary" style="margin-bottom: 8px;">入室する</button>
            <button type="button" id="master-cancel-btn" class="btn-secondary">ログアウト</button>
        </div>

        <div style="margin-top: 24px; text-align: center; border-top: 1px solid #eee; padding-top: 16px;">
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px;">画面が動かない・真っ黒な場合：</p>
            <button onclick="clearCacheSurgically();"
                style="font-size: 0.75rem; background: #fee2e2; color: #b91c1c; padding: 6px 12px; border-radius: 6px; border: 1px solid #fecaca; font-weight: 600;">ブラウザのキャッシュを強制消去</button>
        </div>

        <div style="margin-top: 24px; text-align: center;">
            <p style="font-size: 0.75rem; color: #64748b;">
                ログインすることで、<a href="terms.html" target="_blank"
                    style="color: var(--primary); text-decoration: none;">利用規約</a>および<br><a href="privacy.html"
                    target="_blank" style="color: var(--primary); text-decoration: none;">プライバシーポリシー</a>に同意したものとみなされます。
            </p>
        </div>
    </div>

    <!-- Order Screen (Initially Hidden) -->
    <div id="order-container" class="container hidden">
        <header style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <h2 style="margin: 0; white-space: nowrap;">商品一覧</h2>
                <button id="refresh-items-btn" title="マスタを最新に更新">🔄</button>
            </div>
            <div id="client-name-display"
                style="font-weight: 600; color: var(--primary); font-size: 0.9rem; margin-left: 5px;"></div>
            <div style="flex-grow: 1;"></div>
            <button id="cart-toggle-btn" class="btn-secondary" title="カート一覧">
                🛒 <span id="cart-badge">0</span>点
            </button>
            <button id="logout-btn" class="btn-secondary">ログアウト</button>
        </header>

        <!-- Announcement Banner -->
        <div id="announcement-banner" class="banner hidden">
            <p id="announcement-text"></p>
        </div>

        <div class="filter-tabs">
            <button id="tab-all" class="tab-btn active">すべて</button>
            <button id="tab-favorites" class="tab-btn">お気に入り ★</button>
            <button id="tab-history" class="tab-btn">発注履歴 🕒</button>
        </div>

        <!-- Sync from History Button (Visible only on Favorites tab) -->
        <div id="sync-favs-wrapper" style="margin-bottom: 12px;">
            <button id="sync-history-favs-btn" class="btn-secondary"
                style="width: 100%; background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; font-weight: 600; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 6px;">
                🔄 導入履歴からお気に入りに同期
            </button>
            <p id="sync-msg" class="hidden"
                style="font-size: 0.75rem; text-align: center; margin-top: 4px; color: #166534; font-weight: 500;"></p>
        </div>

        <div class="search-container" id="search-wrapper">
            <input type="text" id="search-input" placeholder="商品名で検索...">
        </div>

        <!-- Manufacturer Chips -->
        <div class="scroll-container-outer">
            <button id="mfr-arrow-left" class="scroll-arrow left">‹</button>
            <div id="manufacturer-chips-container" class="category-scroll-wrapper" style="margin-bottom: 0px;">
                <!-- Manufacturer Chips injected by JS -->
            </div>
            <button id="mfr-arrow-right" class="scroll-arrow right">›</button>
        </div>

        <!-- Category Chips -->
        <div class="scroll-container-outer">
            <button id="cat-arrow-left" class="scroll-arrow left">‹</button>
            <div id="category-chips-container" class="category-scroll-wrapper">
                <!-- Category Chips injected by JS -->
            </div>
            <button id="cat-arrow-right" class="scroll-arrow right">›</button>
        </div>
        <!-- Chips injected by JS -->

        <div id="item-list">
            <!-- Items will be loaded here dynamically -->
        </div>

        <!-- Custom Items Wrapper -->
        <div id="custom-items-wrapper" style="margin-top: 20px;">
            <div id="custom-items-list">
                <!-- Dynamic custom items injected here -->
            </div>
            <button id="add-custom-item-btn" type="button" class="btn-secondary"
                style="width: 100%; border: 2px dashed var(--primary-color); background: #f8fafc; color: var(--primary-color); padding: 12px; font-weight: bold; margin-top: 10px;">
                ＋ 特注・その他の商品を追加する
            </button>
        </div>

        <div id="history-list" class="hidden">
            <!-- Order history will be loaded here dynamically -->
        </div>

        <div class="cart-summary">
            <p>選択中: <span id="total-qty">0</span>点</p>
            <button id="cancel-edit-btn" class="btn-secondary hidden"
                style="background:#fff; border-radius: var(--radius-full);">編集取消</button>
            <button id="save-draft-btn" class="btn-secondary"
                style="background:#f1f5f9; border-radius: var(--radius-full); color: var(--text-main); font-weight: 500;">一時保存</button>
            <button id="order-submit-btn" class="btn-primary">発注する</button>
        </div>
    </div> <!-- Close order-container -->


    <!-- Confirmation Screen -->
    <div id="confirmation-container" class="container hidden">
        <header>
            <h2>発注内容の最終確認</h2>
        </header>

        <div class="confirm-items-wrapper">
            <p class="modal-desc" style="margin-bottom: 20px;">以下の内容で発注を確定しますか？</p>
            <div id="confirm-item-list" class="confirm-items">
                <!-- Items injected by JS -->
            </div>
        </div>

        <div class="remarks-container" style="margin-top: 20px;">
            <label for="order-remarks"
                style="display: block; font-weight: bold; margin-bottom: 8px; color: var(--text-main);">備考・ご要望</label>
            <textarea id="order-remarks" placeholder="納品日時のご指定や注意事項があればご記入ください..." rows="3"
                style="width: 100%; border-radius: var(--radius-md); padding: 12px; border: 1px solid var(--border-color); font-family: inherit; resize: vertical;"></textarea>
        </div>

        <div class="modal-actions" style="margin-top: 30px; display: flex; gap: 12px;">
            <button id="modal-cancel-btn" class="btn-secondary" style="flex: 1;">戻る</button>
            <button id="modal-confirm-btn" class="btn-primary" style="flex: 1;">注文を確定する</button>
        </div>
    </div>
    <!-- Maintenance Screen -->
    <div id="maintenance-container" class="container hidden" style="text-align: center; padding: 60px 24px;">
        <span style="font-size: 4rem; display: block; margin-bottom: 24px;">🛠️</span>
        <h2 style="margin-bottom: 16px;">メンテナンス中</h2>
        <p id="maintenance-message" style="line-height: 1.6; color: #475569; margin-bottom: 32px;">
            現在、システムメンテナンスのため発注を停止しております。<br>再開まで今しばらくお待ちください。
        </p>
        <div style="border-top: 1px solid #e2e8f0; padding-top: 24px; font-size: 0.875rem; color: #64748b;">
            緊急の場合は直接担当者までご連絡ください。
        </div>
    </div>

    <script src="config.js?v=2.11.9"></script>
    <script src="app.js?v=2.11.9"></script>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar hidden">
        <div class="cart-sidebar-header">
            <h3>🛒 カート</h3>
            <button id="cart-close-btn" class="cart-close-btn">&times;</button>
        </div>
        <div id="cart-sidebar-list" class="cart-sidebar-list">
            <!-- Cart items injected by JS -->
        </div>
        <div class="cart-sidebar-footer">
            <p class="cart-sidebar-total">合計 <strong id="cart-sidebar-total-qty">0</strong> 点</p>
            <div class="cart-sidebar-actions">
                <button id="cart-save-draft-btn" class="btn-secondary">一時保存</button>
                <button id="cart-order-submit-btn" class="btn-primary">発注する</button>
            </div>
        </div>
    </div>
    <div id="cart-overlay" class="cart-overlay hidden"></div>
</body>

</html>
